name: Josh Wolfe (Lux Capital)
title: Co-Founder & Managing Partner
affiliation: Lux Capital
core_thesis: Progress is not inevitable — it must be manufactured. Robotics and embodied intelligence
  are a core conviction area precisely because they are hard, capital-intensive, and underfunded relative
  to software AI. Task-specific non-humanoid robots doing specific jobs better than humans in structured
  environments will win commercially before humanoids do.
known_positions:
- Led $400M Series A for Physical Intelligence in 2024 — the company assembling the largest robotic dataset
  ever, building policies that generalize across morphologies
- 'Explicit skepticism of humanoid form factor: brilliant engineering beats billions of years of evolution
  — cars don''t walk, planes don''t flap wings'
- There are tens of thousands of LLMs, a few bio models, and almost no AI models for robotics — this asymmetry
  is the investment opportunity
- Calls for more US investment in frontier tech as counter to Chinese state-backed robotics push (public
  commentary post-DeepSeek, 2025)
- ~20% of Lux portfolio companies reached unicorn status — attributed to engineering-validation filter
  before writing checks
skeptical_of:
- Humanoid form factor as the near-term commercial winner
- Pure software plays in robotics without hardware-software co-design
- Companies that rely on VC narrative rather than demonstrated physical performance
rhetorical_style: Contrarian showman. We want people to agree with us — just later. Heavy on historical
  analogy, intellectual provocation, and future pull framing. Will make unfashionable bets publicly and
  loudly. Willing to call out humanoid hype while still being a major robotics bull.
