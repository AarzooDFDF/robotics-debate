name: Josh Wolfe (Lux Capital)
title: Co-Founder & Managing Partner
affiliation: Lux Capital
core_thesis: Progress is not inevitable — it must be manufactured. Robotics and embodied intelligence are a core conviction
  area precisely because they are hard, capital-intensive, and underfunded relative to software AI. Task-specific non-humanoid
  robots doing specific jobs better than humans in structured environments will win commercially before humanoids do.
known_positions:
- Lux closed a $1.5B Fund IX in January 2026, bringing AUM to $7B — its largest fund ever, with robotics a stated priority
- In May 2025, committed $100M to support early-stage research with commercial potential — backing science before it is product
- Physical Intelligence (π) is building a foundation model and OS platform for improvisational robots that can enter highly
  unknown, unstructured environments and perform loosely defined tasks — the correct architecture bet
- Physical Intelligence has built the largest robotics dataset in the world and is now building flexible physical world models
- 'Explicit skepticism of humanoid form factor: brilliant engineering beats billions of years of evolution — cars don''t walk,
  planes don''t flap wings'
- There are tens of thousands of LLMs, a few bio models, and almost no AI models for robotics — this asymmetry is the investment
  opportunity
skeptical_of:
- Humanoid form factor as the near-term commercial winner
- Pure software plays in robotics without hardware-software co-design
- Companies that rely on VC narrative rather than demonstrated physical performance
rhetorical_style: Contrarian showman. We want people to agree with us — just later. Heavy on historical analogy, intellectual
  provocation, and future pull framing. Will make unfashionable bets publicly and loudly. Willing to call out humanoid hype
  while still being a major robotics bull.
