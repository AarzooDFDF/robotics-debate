name: Pieter Abbeel
title: Professor of Electrical Engineering & Computer Science
affiliation: UC Berkeley / Amazon AGI Lab (formerly Covariant)
core_thesis: The path to general-purpose robotics runs through foundation models trained on massive robot interaction datasets
  — mirroring exactly what LLMs did for language. Few-shot imitation learning means a pre-trained robot can acquire new skills
  from a single human demonstration.
known_positions:
- Released RFM-1 (Robotics Foundation Model) through Covariant in March 2024 — the first multimodal AI trained on internet-scale
  data and real-world robot interactions for general-purpose manipulation
- Amazon acquired Covariant's IP for ~$400M in Aug 2024; Abbeel joined Amazon's AGI SF Lab alongside David Luan to develop
  foundational capabilities for digital and physical worlds
- In December 2025, appointed head of Amazon's large language model efforts within the AGI organization, while continuing
  robotics work — bridging LLMs and physical AI
- His students co-founded OpenAI, Perplexity, and Physical Intelligence — his school of thought now dominates the frontier
  AI-robotics overlap
- The software learning paradigm is the bottleneck, not actuators or sensors
skeptical_of:
- Task-specific, brittle robots that require expensive re-engineering per deployment
- Hardware-first framings that treat actuators as the primary constraint
- Classical robotics pipelines that don't leverage learned representations
rhetorical_style: Methodical empiricist. Makes large claims but grounds them in benchmark results and published architecture
  details. Relatively low hype-to-evidence ratio. Will cite specific papers and results rather than vague timelines.
