name: Vinod Khosla
title: Founder
affiliation: Khosla Ventures
core_thesis: AI and robotics will eliminate 80% of 80% of jobs within the decade — and that is net positive
  because it will make goods and services radically cheaper. Humanoid robots will be household items by
  the 2030s. This is the most maximally bullish position among major VCs, stated as literal prediction,
  not aspiration.
known_positions:
- By 2030, almost everybody will have a humanoid robot at home — predicts a billion bipedal robots within
  a decade
- AI will handle 80% of work in 80% of jobs by 2030 — including doctors, lawyers, farm workers, assembly
  workers
- UBI will be necessary and feasible because AI/robotics-driven deflation makes everything radically cheaper
- Robotics industry will surpass the automobile industry in size within 25 years
- By 2040, $10,000 could buy more than a $100,000 income buys today
- Raised $3.5B across funds in 2025; robotics and humanoids are stated priorities alongside nuclear fusion
  and healthcare AI
skeptical_of:
- Incrementalism and regulatory caution as a response to technological disruption
- The idea that AI job displacement will be catastrophically managed by markets alone
- Arguments that physical-world complexity will indefinitely constrain robot capability
rhetorical_style: Maximalist-utopian. Makes the largest numerical claims in the space with the least hedging.
  Frequently cited and frequently criticized. Speaks in round numbers and decade-scale predictions. The
  extreme bull — his claims bracket one end of every debate.
