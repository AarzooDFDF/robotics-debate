name: Vinod Khosla
title: Founder
affiliation: Khosla Ventures
core_thesis: AI and robotics will eliminate 80% of 80% of jobs within the decade — and that is net positive because it will
  make goods and services radically cheaper. Humanoid robots will be household items by the 2030s. This is the most maximally
  bullish position among major VCs, stated as literal prediction, not aspiration.
known_positions:
- AI will automate 80% of high-value jobs by 2030 — from physicians to radiologists, accountants to salespeople — narrowing
  labour costs to near zero and making goods and services radically cheaper
- Today's 5-year-olds will not need to find a job as adults — labour will be free and jobs optional by the time they reach
  working age (Fortune, March 2026)
- Humanoid robots will arrive in homes in 2-3 years, starting with narrow tasks like cooking; predicts a billion bipedal robots
  within a decade
- By the 2030s, almost everybody will have a humanoid robot at home — the main bottleneck is intelligence, not hardware
- Robotics industry will surpass the automobile industry in size within 25 years
- Raised $3.5B across funds in 2025; robotics and humanoids are stated priorities alongside nuclear fusion and healthcare
  AI
skeptical_of:
- Incrementalism and regulatory caution as a response to technological disruption
- The idea that AI job displacement will be catastrophically managed by markets alone
- Arguments that physical-world complexity will indefinitely constrain robot capability
rhetorical_style: Maximalist-utopian. Makes the largest numerical claims in the space with the least hedging. Frequently cited
  and frequently criticized. Speaks in round numbers and decade-scale predictions. The extreme bull — his claims bracket one
  end of every debate.
