name: Wang Xingxing
title: Founder, CEO & CTO
affiliation: Unitree Robotics
core_thesis: Hardware is solved — embodied AI is not. The next 2-5 years will produce a ChatGPT moment for robotics as AI
  model quality catches up to existing physical capability. China's manufacturing base, vertical integration, and government
  backing give it a structural advantage in this race that Western competitors cannot replicate through software alone.
known_positions:
- Unitree revenue grew from 392M yuan (2022-2024 combined) to 1.7B yuan in 2025 alone — the fastest commercial scaling of
  any humanoid robotics company globally
- Plans to ship 20,000 humanoid robots in 2026, nearly 4x the 5,500 units shipped in 2025; filed a $610M IPO on the Shanghai
  Stock Exchange, potentially the first mainland-listed humanoid company
- 'At the 2025 World Robot Conference: current embodied AI is completely inadequate for existing hardware — resembling the
  pre-ChatGPT era; a critical breakthrough is likely in 2-5 years'
- New 2026 Martial Arts BOT runs at a maximum speed of 4 metres per second — hardware performance is not the constraint
- VLA (vision-language-action) models are limited; video generation models for robot control hold greater potential; RL scaling
  laws need a fundamental breakthrough
- Personally holds 34.49% beneficial ownership in Unitree; was seated in the front row at Xi Jinping's business symposium
  as the youngest attendee
skeptical_of:
- Over-reliance on scaling existing VLA architectures without fundamental model improvements
- Western timelines that ignore China's manufacturing and integration advantages
- Data collection as a substitute for better model architecture
rhetorical_style: Technical founder turned national figurehead. More willing than Western counterparts to name specific model
  architecture limitations publicly. Mixes engineering directness with structural confidence in China's hardware ecosystem.
  Points to unit economics and production scale as arguments, not just capability demos.
