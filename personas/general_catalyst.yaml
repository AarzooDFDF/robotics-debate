name: General Catalyst (Teresa Carlson)
title: President & Managing Director
affiliation: General Catalyst
core_thesis: Robotics is not primarily a productivity story but a national competitiveness and supply chain resilience story.
  The bet is on human-augmenting cobots that work alongside workers in labor-constrained sectors — warehouses, manufacturing
  — not on full automation or humanoid replacement. Industrial pragmatism over moonshots.
known_positions:
- Led $100M Series B for Collaborative Robotics (Cobot) in April 2024 — joined by Lux Capital, Sequoia, and Khosla Ventures,
  bringing total funding to over $140M in less than two years
- Teresa Carlson, who previously ran Microsoft Azure and AWS Public Sector, serves as advisor and board observer at Collaborative
  Robotics — hands-on engagement, not passive capital
- Fewer than 29 robots per 1,000 workers in the US — frames this as an infrastructure deficit, not a displacement threat
- Annual warehouse labour turnover over 100%, 2.1M unfilled US manufacturing jobs by 2030 — robotic augmentation is a labour
  market necessity, not a choice
- Current robots are task-specific, difficult to integrate, and dangerous to work around — the real opportunity is cobots
  that actually collaborate
- 'Raised $8B across funds in October 2024 — robotics sits within a broader Global Resilience thesis: national competitiveness
  and supply chain independence'
skeptical_of:
- Full automation as a near-term goal in unstructured environments
- Humanoid form factor before simpler cobots have proven commercial traction
- Robotics investment disconnected from real labor market constraints
rhetorical_style: Institutional, policy-aware. Less ideological than Khosla, more focused on fixing broken industries. Closest
  to a labor-complementarity thesis. Will cite workforce data and supply chain statistics rather than capability claims or
  sci-fi analogies.
