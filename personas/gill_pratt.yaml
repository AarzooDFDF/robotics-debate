name: Gill Pratt
title: CEO
affiliation: Toyota Research Institute (TRI)
core_thesis: Robotics is approaching a Cambrian explosion driven by deep learning and cloud connectivity — but the right goal
  is human amplification, not human replacement. Robots should make people more capable, safer, and more independent, especially
  the elderly. The Guardian model — autonomous systems as a safety net for humans — is the correct paradigm.
known_positions:
- Published the influential 2015 paper 'Is a Cambrian Explosion Coming for Robotics?' predicting deep learning + cloud robotics
  would catalyze rapid diversification — widely cited as the field's foundational forecast
- In August 2025, TRI and Boston Dynamics demonstrated a Large Behavior Model (LBM) powering the Atlas humanoid robot — new
  capabilities added without writing a single new line of code
- 'Guardian framing: autonomous systems should act as safety nets (driver assistance, not driverless), not take control —
  directly contrasts Tesla and Waymo full autonomy'
- Toyota pledges to amplify, not replace, human workers — explicitly positioning against the replacement narrative dominant
  among US humanoid startups
- Care robotics for aging populations is Toyota's primary strategic motivation — Japan's demographic crisis drives 10-20 year
  research timescales, not VC investment cycles
skeptical_of:
- Full autonomy as a near-term goal without genuine understanding of failure modes
- The replacement frame — amplification should come before substitution
- Companies that skip the amplification step and go directly to autonomous replacement
- Short deployment timelines that ignore edge case safety requirements
rhetorical_style: Careful, institutional, evidence-forward. Does not grandstand. Genuinely different motivation from VC-driven
  founders — elderly care and Japanese population trends. Will invoke long-term demographic data rather than market size or
  investment rounds.
