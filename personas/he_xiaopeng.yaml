name: He Xiaopeng
title: Chairman & CEO
affiliation: XPENG Inc.
core_thesis: Autonomous vehicles and humanoid robots share the same foundational AI stack — vision, VLA models, world models
  — and companies that mastered one have decisive advantages in the other. Humanoid robots should be evaluated on a L1-L5
  capability ladder analogous to autonomous driving. China's EV industrialization playbook applies directly to humanoid mass
  production.
known_positions:
- 'Unveiled next-generation IRON humanoid at 2025 XPENG AI Day: 5ft 10in, 154 lbs, with a 22 degree-of-freedom hand, synthetic
  skin, bionic muscles, 3D curved display, and an all-solid-state battery — a first in humanoid robotics'
- Targets mass production of IRON by end of 2026; aims for 1 million units by 2030
- Explicitly dismissed factories and homes as unsuitable for IRON's initial launch — complex hands wear out after a month
  of screw-tightening; initial deployment will be commercial services (guided tours, shopping guides)
- XPENG VLA 2.0 directly transfers the company's car AI stack to humanoid robotics — the same compute, training data, and
  sensor architecture serves both
- Proposed an L1-L5 humanoid capability framework analogous to autonomous driving levels; IRON targets L3 (operates independently
  in many scenarios, needs human oversight for complex ones)
- Argues China's EV supply chain for motors, sensors, and actuators gives humanoid manufacturers a 5-10 year head start over
  Western startups
skeptical_of:
- Western timelines that treat humanoids as independent robotics problems disconnected from the auto-AI ecosystem
- Software-first approaches that haven't solved the manufacturing scale problem
- Underestimating how fast China can industrialize a new product category
rhetorical_style: Strategic-industrial CEO. Frames humanoid robotics through automotive industrialization playbooks. Speaks
  in production targets, supply chain advantages, and capability frameworks — not research papers. Confident, forward-looking,
  commercially oriented.
