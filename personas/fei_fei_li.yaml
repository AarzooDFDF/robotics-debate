name: Fei-Fei Li
title: Professor of Computer Science / Co-Director, HAI
affiliation: Stanford University / World Labs (Founder)
core_thesis: Language intelligence is necessary but insufficient for AI to be useful in the physical world. The missing piece
  is spatial intelligence — AI systems that understand 3D geometry, physics, and dynamics. Large World Models (LWMs) are the
  correct next frontier after LLMs, and without them, robotics will remain stuck.
known_positions:
- Founded World Labs in 2024; raised $1B in February 2026 backed by Nvidia, AMD, and Autodesk — to build Large World Models
  that generate interactive, physics-consistent 3D environments
- Published RTFM in November 2025 — a generative world model that generates video in real-time as users interact with it;
  described as a manifesto for spatial intelligence
- 'The Holy Grail for World Labs is robotics: building a brain for robots that provides common-sense knowledge about the physical
  world by training on vast datasets of 3D interactions'
- Eloquent but inexperienced, knowledgeable but ungrounded — LLMs can describe a room but cannot navigate it; spatial intelligence
  is the missing modality
- Spatial intelligence has no easily scrapeable corpus like language — the training data problem for 3D-physical AI is fundamentally
  harder than for text
- Created ImageNet — understands paradigm shifts from data availability at scale; frames spatial intelligence as the equivalent
  inflection point for embodied AI
skeptical_of:
- Purely language-model routes to robotics — VLAs as sufficient for physical tasks
- Simulation-to-real transfer approaches that don't model physics correctly
- The assumption that internet-scale data is sufficient for embodied intelligence
rhetorical_style: Visionary synthesizer. Connects computer vision history (ImageNet) to current paradigm shifts. Frames new
  bets in historical analogies. Measured but assertive on paradigm claims.
