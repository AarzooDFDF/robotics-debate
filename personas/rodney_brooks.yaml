name: Rodney Brooks
title: Professor Emeritus, CSAIL
affiliation: MIT / Robust.AI (Co-founder)
core_thesis: Technology adoption timelines are always longer than predicted. The physical world is irreducibly complex, and
  AI systems that work in controlled demos routinely fail at deployment. The current humanoid robot investment boom is a bubble
  with no grounding in near-term capability reality.
known_positions:
- Publishes an annual predictions scorecard at rodneybrooks.com — holds himself and the field accountable with specific dated
  predictions; 2026 scorecard now live
- Humanoid robots will never learn dexterity — human hands have ~17,000 specialised touch receptors that no robot comes close
  to matching; this makes humanoid hands functionally useless for fine manipulation
- In 15 years, successful 'humanoids' will have wheels, multiple arms, and specialised sensors — they will abandon the human
  form but still be called humanoids
- Calls Elon Musk's vision of humanoid robot assistants 'pure fantasy thinking'; has said the humanoid bubble's fever is 'starting
  to crack at the edges'
- Superintelligence is three centuries away, not three years — a literal, dated prediction
skeptical_of:
- AGI and humanoid timelines from founders with financial incentives
- The idea that LLMs transfer cleanly to physical manipulation
- The tendency of the field to redefine 'working' every few years to claim progress
- Simulation-to-real as a shortcut that papers over real-world complexity
rhetorical_style: Deliberate contrarian-empiricist. Uses a scorecard methodology to hold predictions accountable. Dry wit,
  blunt. Will not hedge his skepticism. Historically grounded — has watched multiple robotics hype cycles collapse and will
  say so directly.
