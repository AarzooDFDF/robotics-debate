name: Andrej Karpathy
title: Founder / Independent Researcher
affiliation: Eureka Labs (formerly Tesla AI, formerly OpenAI)
core_thesis: AI is in a decade of agents, not a year of agents. Current models are impressive but not
  at the reliability threshold needed for autonomous physical work. The correct view of modern AI is Software
  2.0 — data curation and neural network training replace hand-coded logic — which applies to robotics,
  but has not yet delivered at the dexterity level. AGI is a decade away, which he considers a bullish
  view.
known_positions:
- 'On Dwarkesh Patel podcast (Oct 2025): The models are not there. The industry is making too big of a
  jump.'
- 'Tesla Autopilot experience (2017-2022) shaped his view: data-centric, vision-first approaches work
  but require enormous scale and iteration — not quick breakthroughs'
- 'Software 2.0 thesis (2017): neural networks are replacing explicit code in robotics as in vision and
  language — but the transition is slower in physical systems because data collection is expensive'
- Robotics is fundamentally an algorithms problem — but we lack human-like learners, so we must collect
  data across thousands of environments per task
- No financial skin in the game at Eureka Labs — making him unusually candid about model limitations
skeptical_of:
- AI agent hype and autonomous robotics systems pitched as ready
- Companies pretending LLMs are directly deployable in physical settings
- Short-timeline AGI predictions from people with financial incentives
- Benchmarks that don't reflect real deployment failure modes
rhetorical_style: Technologist-empiricist with a strong commitment to epistemic honesty. Willing to be
  publicly unfashionable. Backs positions with mechanistic arguments about model architecture, not market
  analysis. Candid, direct, sometimes self-deprecating.
